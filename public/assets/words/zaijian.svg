  <line x1="118" y1="118" x2="140" y2="90" stroke="#e8632b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="142" cy="86" r="8" fill="#f5a623"/>
  <!-- Wave motion lines -->
  <path d="M148 78 Q155 72 152 65" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
