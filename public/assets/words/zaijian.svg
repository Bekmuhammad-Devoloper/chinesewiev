  <!-- Person walking away -->
  <circle cx="200" cy="85" r="20" fill="#63b3ed" opacity="0.6"/>
  <rect x="186" y="111" width="28" height="42" rx="7" fill="#3182ce" opacity="0.6"/>
  <!-- Arrow -->
