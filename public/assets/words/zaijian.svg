<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8f4fd"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="16" fill="url(#bg9)"/>
  <!-- Person waving goodbye -->
  <circle cx="100" cy="80" r="24" fill="#f5a623"/>
  <circle cx="92" cy="76" r="3" fill="#333"/>
  <circle cx="108" cy="76" r="3" fill="#333"/>
  <path d="M94 88 Q100 94 106 88" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <rect x="82" y="110" width="36" height="50" rx="8" fill="#e8632b"/>
