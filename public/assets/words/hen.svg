  <path d="M200 140 L200 70" stroke="#e8632b" stroke-width="3" stroke-linecap="round"/>
  <polygon points="200,60 194,72 206,72" fill="#e8632b"/>
  <!-- Sparkles at top -->
  <circle cx="110" cy="55" r="4" fill="#f5a623" opacity="0.6"/>
  <circle cx="170" cy="50" r="3" fill="#e8632b" opacity="0.5"/>
  <circle cx="140" cy="40" r="5" fill="#f5a623" opacity="0.4"/>
